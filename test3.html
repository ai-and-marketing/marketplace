<!DOCTYPE html>
<html>
<body>

<button onclick="send()">Send Test Data</button>

<script>
function send() {
  fetch("https://script.google.com/macros/s/AKfycbzhFBBq5v_elUG_94vFsCdV5tdzvjdGTSaKRyjhFBK8H_CC9a2UxBdeEHoi7gShe/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: "Test Product",
      category: "Test",
      desc: "This is a test",
      price: 123,
      badge: "New",
      img: "https://example.com/image.jpg"
    })
  })
  .then(res => res.json())
  .then(data => console.log(data))
  .catch(err => console.error(err));
}
</script>

</body>
</html>
