<!DOCTYPE html>
<html>
<body>
  <button onclick="send()">Send Test Data</button>
  <pre id="output" style="margin-top:1rem; font-size:0.9rem;"></pre>

  <script>
    function send() {
      const output = document.getElementById("output");
      output.textContent = "Sending…";

      fetch("https://script.google.com/macros/s/AKfycbzhFBBq5v_elUG_94vFsCdV5tdzvjdGTSaKRyjhFBK8H_CC9a2UxBdeEHoi7gShe/exec", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name:     "Test Product",
          category: "Test",
          desc:     "This is a test",
          price:    123,
          badge:    "New",
          img:      "https://example.com/image.jpg"
        })
      })
      .then(res => res.json())
      .then(data => {
        console.log(data);
        output.textContent = "Response: " + JSON.stringify(data, null, 2);
      })
      .catch(err => {
        console.error(err);
        // CORS errors show up here — check your Sheet directly to confirm the row was written
        output.textContent = "Error (possibly just CORS — check your Sheet): " + err.message;
      });
    }
  </script>
</body>
</html>
