<!DOCTYPE html>
<html>
<body>
  <button onclick="send()">Send Test Data</button>
  <pre id="output" style="margin-top:1rem; font-size:0.9rem;"></pre>

  <script>
    function send() {
      const output = document.getElementById("output");
      output.textContent = "Sending…";

      const data = {
        name:     "Test Product",
        category: "Test",
        desc:     "This is a test",
        price:    123,
        badge:    "New",
        img:      "https://example.com/image.jpg"
      };

      fetch("https://script.google.com/macros/s/AKfycbzhFBBq5v_elUG_94vFsCdV5tdzvjdGTSaKRyjhFBK8H_CC9a2UxBdeEHoi7gShe/exec", {
        method: "POST",
        // No Content-Type header — this prevents the CORS preflight that kills the request
        body: JSON.stringify(data)
      })
      .then(res => res.json())
      .then(data => {
        console.log(data);
        output.textContent = "Response: " + JSON.stringify(data, null, 2);
      })
      .catch(err => {
        console.error(err);
        output.textContent = "Error: " + err.message;
      });
    }
  </script>
</body>
</html>
